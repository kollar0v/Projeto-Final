<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
rel='stylesheet'> <!-- Comando para poder usar os boxicons no inputbox -->
    <title>casa</title>
    
</head>
<body>
    <main class="container">
        <form>
            <h1>Login</h1>
            <div class="input-box">
                <input placeholder="Usuário" type="email">
                <i class="bx bxs-user"></i> <!--boxicons com o codigo bxs-user --> 
            </div>
            <div class="input-box">
                <input placeholder="Senha" type="password">   
                <i class="bx bxs-lock-alt"></i> <!--boxicons com codigo bxs-lock-alt -->           
            </div>
        </form>
    </main>
    
</body>
</html>
